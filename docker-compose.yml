version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=gestor_inventario
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=tu_contrasena_segura
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    command: >
      sh -c "python3 manage.py makemigrations &&
             python3 manage.py migrate &&
             python3 manage.py runserver 0.0.0.0:8082"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DB_NAME=gestor_inventario
      - DB_USER=postgres
      - DB_PASSWORD=tu_contrasena_segura
      - DB_HOST=db
      - DB_PORT=5432
      - ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://frontend:80
    volumes:
      - ./backend:/app
    ports:
      - "8082:8082"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      - BACKEND_URL=http://backend:8082
    ports:
      - "80:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
